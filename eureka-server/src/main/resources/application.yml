server:
  port: 8761

spring:
  application:
    name: eureka-server
  config:
    import: optional:configserver:http://config-server:8888
  cloud:
    config:
      fail-fast: false
      retry:
        initial-interval: 3000
        max-attempts: 20
        max-interval: 10000
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
